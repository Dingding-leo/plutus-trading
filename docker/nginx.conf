# docker/nginx.conf
# RT5: WebSocket routing + SSL termination
# Routes WS/SSE clients to the correct backend service

events {
    worker_connections 1024;
}

http {
    include /etc/nginx/mime.types;
    default_type application/octet-stream;

    # ── Access / Error logs ───────────────────────────────────────────────
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # ── General settings ────────────────────────────────────────────────────
    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;
    keepalive_timeout 65;
    types_hash_max_size 2048;

    # ── Gzip ───────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain application/json application/javascript;

    # ── Rate limiting ──────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_req_zone $binary_remote_addr zone=ws_limit:10m rate=10r/s;

    # ── Upstream backends ──────────────────────────────────────────────────
    upstream plutus_engine {
        server plutus_engine:8000;
        keepalive 32;
    }

    # ── HTTP server (redirect to HTTPS in production) ───────────────────
    server {
        listen 80;
        server_name _;

        # Health check endpoint
        location /health {
            return 200 'ok';
            add_header Content-Type text/plain;
        }

        # ── SSE endpoint ──────────────────────────────────────────────────
        location /sse/signals {
            limit_req zone=ws_limit burst=20 nodelay;

            proxy_pass http://plutus_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # SSE-specific headers (RT3)
            proxy_buffering off;
            proxy_cache off;
            proxy_flush after_send;
            chunked_transfer_encoding on;

            # Long keepalive for SSE
            proxy_connect_timeout 60s;
            proxy_read_timeout 300s;
        }

        # ── WebSocket endpoint ───────────────────────────────────────────
        location /ws/signals {
            limit_req zone=ws_limit burst=20 nodelay;

            proxy_pass http://plutus_engine;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # WebSocket timeouts (RT3: long-lived connections)
            proxy_connect_timeout 7d;
            proxy_send_timeout 7d;
            proxy_read_timeout 7d;

            # Disable buffering — critical for real-time WS
            proxy_buffering off;
            proxy_cache off;
        }

        # ── REST API ──────────────────────────────────────────────────────
        location / {
            limit_req zone=api_limit burst=50 nodelay;

            proxy_pass http://plutus_engine;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            proxy_connect_timeout 30s;
            proxy_read_timeout 30s;
        }
    }

    # ── HTTPS server (enable in production with certs) ────────────────────
    # server {
    #     listen 443 ssl http2;
    #     server_name plutus.example.com;
    #
    #     ssl_certificate /etc/nginx/ssl/cert.pem;
    #     ssl_certificate_key /etc/nginx/ssl/key.pem;
    #     ssl_protocols TLSv1.2 TLSv1.3;
    #     ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256;
    #     ssl_prefer_server_ciphers off;
    #
    #     # (same location blocks as above)
    # }
}
